<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Patrick's Camel Video</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f1110 0%, #18231a 100%);
      color: #f4f1e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: min(960px, 92vw);
      padding: 32px 20px 48px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
      opacity: 0.9;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    img {
      width: 100%;
      max-width: 960px;
      border-radius: 14px;
      display: block;
      margin: 0 auto 18px;
    }

    audio {
      width: 100%;
      max-width: 560px;
      margin-top: 10px;
    }

    .note {
      margin-top: 18px;
      font-size: 15px;
      opacity: 0.8;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #214f2d;
      color: #dff4e3;
      font-size: 14px;
    }

    a {
      color: #b4f0c0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>St. Patrick’s Day Camel</h1>
    <p>Preview page hosted on GitHub Pages</p>

    <div class="card">
      <img src="Happy_St_Patricks_Day.png" alt="Camel in Irish pub holding Irish coffee" />
      <div class="tag">Image + soundtrack preview</div>
      <div>
        <audio controls>
          <source src="Emerald_Fury.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>
      <div class="note">
        The final video player will be added after <strong>final_video.mp4</strong> is uploaded.
      </div>
    </div>
  </div>
</body>
</html>
